<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#08080e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#58a6ff" flood-opacity="0.25"/>
    </filter>
    <style type="text/css"><![CDATA[
      text { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .title { fill: #f0f6fc; font-size: 22px; font-weight: 700; }
      .subtitle { fill: #8b949e; font-size: 12px; }
      .label { fill: #8b949e; font-size: 11px; font-weight: 600; }
      .body { fill: #c9d1d9; font-size: 10px; }
      .small { fill: #8b949e; font-size: 9px; }
    ]]></style>
  </defs>

  <rect width="960" height="780" fill="url(#bg)"/>
  <text class="title" x="480" y="42" text-anchor="middle">Harmonix - Backend Architecture</text>
  <text class="subtitle" x="480" y="64" text-anchor="middle">Express gateway on VPS | port 3001 | SQLite | Deezer + LRCLib + NVIDIA NIM</text>

  <!-- Clients -->
  <rect x="40" y="100" width="880" height="72" rx="10" fill="#161b22" stroke="#30363d"/>
  <text class="label" x="60" y="128">CLIENTS</text>
  <rect x="60" y="138" width="150" height="24" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="135" y="154" text-anchor="middle">Browser / PWA</text>
  <rect x="230" y="138" width="150" height="24" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="305" y="154" text-anchor="middle">Capacitor Android</text>
  <rect x="400" y="138" width="150" height="24" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="475" y="154" text-anchor="middle">WebView (ngrok)</text>
  <text x="780" y="154" fill="#58a6ff" font-size="11" text-anchor="end">HTTPS -&gt; ngrok tunnel</text>

  <line x1="480" y1="172" x2="480" y2="198" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VPS deploy -->
  <rect x="40" y="200" width="70" height="64" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="small" x="75" y="218" text-anchor="middle" font-weight="600">deploy</text>
  <text class="small" x="75" y="230" text-anchor="middle">.sh</text>
  <text class="small" x="75" y="246" text-anchor="middle">run_env</text>
  <text class="small" x="75" y="258" text-anchor="middle">.sh</text>

  <!-- Express core -->
  <rect x="120" y="200" width="720" height="360" rx="14" fill="#0d1117" stroke="#58a6ff" stroke-width="2" filter="url(#glow)"/>
  <text x="150" y="228" fill="#58a6ff" font-size="14" font-weight="700">Express Server</text>
  <text class="subtitle" x="150" y="246">server/index.js | :3001 | trust proxy | JWT auth | cookie refresh</text>

  <rect x="150" y="262" width="200" height="100" rx="8" fill="#161b22" stroke="#3fb950"/>
  <text x="165" y="282" fill="#3fb950" font-size="11" font-weight="700">AUTH (public)</text>
  <text class="body" x="165" y="300">POST /api/auth/register</text>
  <text class="body" x="165" y="314">POST /api/auth/login</text>
  <text class="body" x="165" y="328">POST /api/auth/refresh</text>
  <text class="body" x="165" y="342">GET  /api/auth/me</text>
  <text class="small" x="165" y="356">bcrypt + JWT + httpOnly cookie</text>

  <rect x="370" y="262" width="200" height="112" rx="8" fill="#161b22" stroke="#d29922"/>
  <text x="385" y="282" fill="#d29922" font-size="11" font-weight="700">MEDIA PROXY</text>
  <text class="body" x="385" y="300">GET /api/search -&gt; Deezer</text>
  <text class="body" x="385" y="314">GET /api/tracks/:id</text>
  <text class="body" x="385" y="328">GET /api/lyrics -&gt; LRCLib</text>
  <text class="body" x="385" y="342">GET /api/audio/preview/:id</text>
  <text class="small" x="385" y="356">30s preview offset calc</text>
  <text class="small" x="385" y="368">same-origin audio proxy (CDN expiry)</text>

  <rect x="590" y="262" width="230" height="112" rx="8" fill="#161b22" stroke="#bc8cff"/>
  <text x="605" y="282" fill="#bc8cff" font-size="11" font-weight="700">PROTECTED API (JWT)</text>
  <text class="body" x="605" y="300">/api/vocab | /api/daily-word</text>
  <text class="body" x="605" y="314">/api/study | /api/progress</text>
  <text class="body" x="605" y="328">/api/validation | /api/badges</text>
  <text class="body" x="605" y="342">/api/playlists | /api/user</text>
  <text class="small" x="605" y="356">user prefs from DB (CEFR, difficulty,</text>
  <text class="small" x="605" y="368">genre) — not JWT claims alone</text>

  <rect x="150" y="390" width="670" height="152" rx="8" fill="#161b22" stroke="#30363d"/>
  <text class="label" x="165" y="410">SERVICES LAYER</text>

  <rect x="165" y="420" width="100" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text x="215" y="442" fill="#f85149" font-size="10" text-anchor="middle" font-weight="600">aiService</text>
  <text class="small" x="215" y="458" text-anchor="middle">NVIDIA NIM</text>
  <text class="small" x="215" y="470" text-anchor="middle">model fallback</text>

  <rect x="275" y="420" width="100" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="325" y="442" text-anchor="middle" font-weight="600">validation</text>
  <text class="small" x="325" y="458" text-anchor="middle">LRC quality</text>
  <text class="small" x="325" y="470" text-anchor="middle">score gate</text>

  <rect x="385" y="420" width="100" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="435" y="442" text-anchor="middle" font-weight="600">alignment</text>
  <text class="small" x="435" y="458" text-anchor="middle">word to lyric</text>
  <text class="small" x="435" y="470" text-anchor="middle">line index</text>

  <rect x="495" y="420" width="100" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="545" y="442" text-anchor="middle" font-weight="600">quiz / SRS</text>
  <text class="small" x="545" y="458" text-anchor="middle">study engine</text>
  <text class="small" x="545" y="470" text-anchor="middle">badges</text>

  <rect x="605" y="420" width="100" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="655" y="442" text-anchor="middle" font-weight="600">dailyWord</text>
  <text class="small" x="655" y="458" text-anchor="middle">song-first</text>
  <text class="small" x="655" y="470" text-anchor="middle">batch + queue</text>

  <rect x="715" y="420" width="90" height="56" rx="6" fill="#21262d" stroke="#484f58"/>
  <text class="body" x="760" y="442" text-anchor="middle" font-weight="600">wordQueue</text>
  <text class="small" x="760" y="458" text-anchor="middle">max 5 ready</text>
  <text class="small" x="760" y="470" text-anchor="middle">POST /next</text>

  <rect x="165" y="486" width="100" height="48" rx="6" fill="#21262d" stroke="#d29922"/>
  <text class="body" x="215" y="506" text-anchor="middle" font-weight="600">deezerService</text>
  <text class="small" x="215" y="522" text-anchor="middle">multi-query search</text>

  <rect x="275" y="486" width="100" height="48" rx="6" fill="#21262d" stroke="#d29922"/>
  <text class="body" x="325" y="506" text-anchor="middle" font-weight="600">lrcLibService</text>
  <text class="small" x="325" y="522" text-anchor="middle">get + search fallback</text>

  <rect x="385" y="486" width="100" height="48" rx="6" fill="#21262d" stroke="#bc8cff"/>
  <text class="body" x="435" y="506" text-anchor="middle" font-weight="600">difficulty</text>
  <text class="small" x="435" y="522" text-anchor="middle">CEFR rubric + filter</text>

  <rect x="495" y="486" width="310" height="48" rx="6" fill="#21262d" stroke="#30363d"/>
  <text class="small" x="650" y="506" text-anchor="middle">deploy.sh: git pull -&gt; npm test -&gt; run_env.sh (backend + Next build + ngrok)</text>
  <text class="small" x="650" y="522" text-anchor="middle">constants/difficulty.js | effectiveCefr() | filterVocabularyByLevel()</text>

  <rect x="280" y="590" width="180" height="64" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="370" y="616" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">SQLite</text>
  <text class="body" x="370" y="634" text-anchor="middle">harmonix.db</text>
  <text class="small" x="370" y="648" text-anchor="middle">users | vocab | songs | daily_words | word_queue</text>
  <line x1="370" y1="542" x2="370" y2="588" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="500" y="590" width="180" height="64" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="590" y="616" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">Next.js :3009</text>
  <text class="body" x="590" y="634" text-anchor="middle">production build</text>
  <text class="small" x="590" y="648" text-anchor="middle">/* -&gt; http-proxy-middleware</text>
  <line x1="590" y1="560" x2="590" y2="588" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="small" x="590" y="578" text-anchor="middle">non-/api routes</text>

  <rect x="40" y="690" width="260" height="64" rx="10" fill="#161b22" stroke="#d29922"/>
  <text x="170" y="716" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">Deezer API</text>
  <text class="small" x="170" y="734" text-anchor="middle">resilient search | track metadata | 30s preview CDN</text>
  <line x1="215" y1="534" x2="170" y2="688" stroke="#d29922" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <rect x="350" y="690" width="260" height="64" rx="10" fill="#161b22" stroke="#d29922"/>
  <text x="480" y="716" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">LRCLib API</text>
  <text class="small" x="480" y="734" text-anchor="middle">get + search | synced LRC | plain to synced synthesis</text>
  <line x1="325" y1="534" x2="480" y2="688" stroke="#d29922" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <rect x="660" y="690" width="260" height="64" rx="10" fill="#161b22" stroke="#f85149"/>
  <text x="790" y="716" fill="#f85149" font-size="12" font-weight="700" text-anchor="middle">NVIDIA NIM</text>
  <text class="small" x="790" y="734" text-anchor="middle">Kimi K2.6 + fallback models | OpenAI-compatible</text>
  <line x1="215" y1="476" x2="790" y2="688" stroke="#f85149" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
</svg>
